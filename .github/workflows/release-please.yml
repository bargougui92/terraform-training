name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
2  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: terraform-module
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
